<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户评论 - 山海行迹</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="data.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body data-page="comments">
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="index.html" aria-label="山海行迹首页">
          <span class="brand-mark"><i data-lucide="map-pinned"></i></span>
          <span><strong>山海行迹</strong><small>Travel Guide</small></span>
        </a>
        <button class="icon-btn nav-toggle" type="button" aria-label="打开导航" data-nav-toggle>
          <i data-lucide="menu"></i>
        </button>
        <nav class="site-nav" data-site-nav>
          <a href="index.html">首页</a>
          <a href="destinations.html">目的地</a>
          <a href="guide.html">旅游攻略</a>
          <a href="comments.html" class="active">用户评论</a>
          <a href="about.html">数据来源</a>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-hero">
        <div>
          <p class="eyebrow">用户评论</p>
          <h1>从真实反馈里发现更适合自己的玩法</h1>
          <p class="lead">旅行者可以为目的地打分、写下体验和建议，新评论会保存在当前浏览器中。</p>
        </div>
        <div class="hero-sidecard">
          <p>评论总数</p>
          <strong data-comment-count>0</strong>
          <span>条</span>
        </div>
      </section>

      <section class="comment-layout">
        <article class="comment-panel">
          <h2>留下你的旅行感受</h2>
          <form class="comment-form" data-comment-form>
            <label>
              昵称
              <input type="text" name="name" maxlength="12" required placeholder="例如：小林" />
            </label>
            <label>
              目的地
              <select name="destination" data-comment-destination></select>
            </label>
            <label>
              评分
              <select name="rating" required>
                <option value="5">5 分，强烈推荐</option>
                <option value="4">4 分，很不错</option>
                <option value="3">3 分，中规中矩</option>
                <option value="2">2 分，体验一般</option>
              </select>
            </label>
            <label class="full-row">
              评论内容
              <textarea
                name="content"
                rows="5"
                maxlength="180"
                required
                placeholder="写下交通、餐饮、景色、踩坑和小建议"
              ></textarea>
            </label>
            <button class="btn btn-primary" type="submit">
              <i data-lucide="send"></i>
              发表评论
            </button>
          </form>
        </article>

        <aside class="comment-panel">
          <div class="block-head">
            <h2>精选评论</h2>
            <button class="btn btn-ghost" type="button" data-clear-comments>
              <i data-lucide="trash-2"></i>
              清除新增
            </button>
          </div>
          <div class="comment-list" data-comment-list></div>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <p>山海行迹 · 旅游指南网站</p>
        <p>评论内容包含默认精选内容和本地新增内容。</p>
      </div>
    </footer>
  </body>
</html>
